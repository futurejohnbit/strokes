<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>iPad Safari WebBLE 設定</title>
    <style>
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 20px; line-height: 1.6; }
      code { background: #f1f5f9; padding: 2px 6px; border-radius: 6px; }
      .card { max-width: 720px; margin: 0 auto; background: #fff7ed; border: 1px solid #fed7aa; border-radius: 16px; padding: 18px 18px; }
      h1 { margin: 0 0 10px; font-size: 20px; }
      a { color: #b45309; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>iPad Safari 藍牙連線提示</h1>
      <p>此離線版本不會自動從網絡下載 iOS WebBLE 相容層。</p>
      <p>如需在 iPad Safari 使用藍牙，通常要先安裝並啟用 WebBLE 擴充/伴侶 App，並在完成後重新整理主頁。</p>
      <p>如你暫時未能上網完成安裝，可改用桌機 Chrome/Edge 的原生 Web Bluetooth，或使用序列埠模式。</p>
      <p>檔案位置：<code>public/vendor/webble.js</code>（你可以把官方 webble.js 放到同一路徑以啟用功能）。</p>
    </div>
  </body>
</html>
